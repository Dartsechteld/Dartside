<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Darts Deelnemers</title>

<link rel="icon"
type="image/png"
href="logo.png">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="page">

  <!-- LOGO -->

  <img
    src="logo.png"
    class="logo-img"
    alt="Darts Echteld"
  >

  <!-- MENU -->

  <nav class="menu">

    <a href="index.html">
      Poulestand
    </a>

    <a
      class="active"
      href="Deelnemers.html"
    >
      Deelnemers
    </a>

  </nav>

  <!-- DEELNEMERS -->

  <table class="info">

    <tr>
      <th>
        Deelnemers
      </th>
    </tr>

    <tr>
      <td id="datum">
        13 juni 2026
      </td>
    </tr>

  </table>

  <table
    class="lijst"
    id="deelnemers"
  ></table>

  <!-- RESERVE -->

  <table class="info">

    <tr>
      <th>
        Reserve lijst
      </th>
    </tr>

  </table>

  <table
    class="lijst"
    id="reserve"
  ></table>

</div>

<!-- PAPAPARSE -->

<script src=
"https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js">
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
const sheetUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vS075yJCgYbuaeO8Mn1jB9SnHKYAyTxMR8lYRCjztsbuiuUZ2sNjrOKH2AxNNp7GkBpDgd23mxN-6kI/pub?gid=74050298&single=true&output=csv";

loadSheet();
setInterval(loadSheet, 30000);

function loadSheet(){

  Papa.parse(sheetUrl + "&t=" + Date.now(), {
    download:true,

    complete:function(result){

      const data = result.data;

      document.getElementById("deelnemers").innerHTML = "";
      document.getElementById("reserve").innerHTML = "";

      // Deelnemers B13:C44
      for(let i = 12; i <= 43; i++){
        const nummer = data[i]?.[1] || "";
        const naam   = data[i]?.[2] || "";

        if(nummer.trim() !== "" || naam.trim() !== ""){
          addRow("deelnemers", nummer, naam);
        }
      }

      // Reserve B47:C78
      for(let i = 46; i <= 77; i++){
        const nummer = data[i]?.[1] || "";
        const naam   = data[i]?.[2] || "";

        if(nummer.trim() !== "" || naam.trim() !== ""){
          addRow("reserve", nummer, naam);
        }
      }
    },

    error:function(error){
      console.log(error);
    }
  });
}

function addRow(tableId, nummer, naam){

  const table = document.getElementById(tableId);
  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td>${nummer}</td>
    <td>${naam}</td>
    <td><input type="checkbox"></td>
  `;

  table.appendChild(tr);
}
</script>

</body>
</html>
