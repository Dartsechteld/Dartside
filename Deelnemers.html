<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Darts Deelnemers</title>

<link rel="icon"
type="image/png"
href="logo.png">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="page">

  <!-- LOGO -->

  <img
    src="logo.png"
    class="logo-img"
    alt="Darts Echteld"
  >

  <!-- MENU -->

  <nav class="menu">

    <a href="index.html">
      Poulestand
    </a>

    <a
      class="active"
      href="Deelnemers.html"
    >
      Deelnemers
    </a>

  </nav>

  <!-- DEELNEMERS -->

  <table class="info">

    <tr>
      <th>
        Deelnemers
      </th>
    </tr>

    <tr>
      <td id="datum">
        13 juni 2026
      </td>
    </tr>

  </table>

  <table
    class="lijst"
    id="deelnemers"
  ></table>

  <!-- RESERVE -->

  <table class="info">

    <tr>
      <th>
        Reserve lijst
      </th>
    </tr>

  </table>

  <table
    class="lijst"
    id="reserve"
  ></table>

</div>

<!-- PAPAPARSE -->

<script src=
"https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js">
</script>

<script>

/* GOOGLE SHEET CSV */

const sheetUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vS075yJCgYbuaeO8Mn1jB9SnHKYAyTxMR8lYRCjztsbuiuUZ2sNjrOKH2AxNNp7GkBpDgd23mxN-6kI/pub?gid=74050298&single=true&output=csv";

/* START */

loadSheet();

/* AUTO REFRESH */

setInterval(
  loadSheet,
  30000
);

/* LOAD SHEET */

function loadSheet(){

  Papa.parse(
    sheetUrl + "&t=" + Date.now(),

    {

      download:true,

      complete:function(result){

        document
          .getElementById(
            "deelnemers"
          )
          .innerHTML = "";

        document
          .getElementById(
            "reserve"
          )
          .innerHTML = "";

        const data =
          result.data;

        let mode =
          "deelnemers";

        data.forEach(
          function(row){

          const nummer =
            row[0] || "";

          const naam =
            row[1] || "";

          const text =
            row.join(" ")
            .toLowerCase();

          /* RESERVE */

          if(
            text.includes(
              "reserve"
            )
          ){
            mode =
              "reserve";

            return;
          }

          /* ALLEEN NUMMERS */

          if(
            nummer.trim() === ""
            ||
            isNaN(
              Number(nummer)
            )
          ){
            return;
          }

          /* RIJ TOEVOEGEN */

          addRow(
            mode,
            nummer,
            naam
          );

        });

      },

      error:function(error){

        console.log(error);

      }

    }

  );

}

/* ADD ROW */

function addRow(
  tableId,
  nummer,
  naam
){

  const table =
    document
    .getElementById(
      tableId
    );

  const tr =
    document
    .createElement("tr");

  tr.innerHTML = `

    <td>
      ${nummer}
    </td>

    <td>
      ${naam}
    </td>

    <td>
      <input type="checkbox">
    </td>

  `;

  table.appendChild(tr);

}

</script>

</body>
</html>
