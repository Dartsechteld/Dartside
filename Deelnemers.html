<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Darts deelnemers</title>
  
<link rel="icon" type="image/png" href="logo.png">

  <style>
body {
  margin: 0;
  background: #0f5963;
  font-family: Arial, sans-serif;
}

.dart-card {
  width: 220px;
  padding: 18px 12px;
  color: white;
  margin: 0 auto;
}

.logo {
  display: block;
  width: 95px;
  margin: 0 auto 6px;
}

.plaats {
  width: 95px;
  margin: 0 auto 14px;
  text-align: center;
  background: #0b7fc3;
  border: 2px solid #62b5ff;
  font-size: 18px;
  line-height: 24px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 18px;
}

.info th,
.info td,
.lijst td {
  border: 1px solid white;
  height: 18px;
  font-size: 12px;
}

.info th,
.info td {
  text-align: center;
  font-weight: bold;
}

.lijst td:first-child {
  width: 24px;
  text-align: center;
}

.lijst td:nth-child(2) {
  padding-left: 6px;
  font-weight: bold;
}

.lijst td:last-child {
  width: 28px;
  text-align: center;
}

input[type="checkbox"] {
  width: 12px;
  height: 12px;
}

.menu {
  width: 220px;
  background: #083f47;
  padding: 8px 12px;
  box-sizing: border-box;

  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;

  margin: 0 auto;
}

.menu a {
  color: white;
  text-decoration: none;
  font-family: Arial, sans-serif;
  font-size: 12px;
  font-weight: bold;
  border: 1px solid white;
  padding: 4px 8px;
  background: #0b7fc3;
}

.menu a:hover {
  background: #62b5ff;
  color: #083f47;
}
    
</style>
</head>

<body>

<nav class="menu">
  <a href="index.html">Poulestand</a>
  <a href="Deelnemers.html">Deelnemers</a>
</nav>
  
<div class="dart-card">

  <img class="logo" src="darts-logo.png" alt="Darts">

  <div class="plaats" id="plaats">Echteld</div>

  <table class="info">
    <tr><th>Deelnemers</th></tr>
    <tr><td id="datum">13 juni 2026</td></tr>
  </table>

  <table class="lijst" id="deelnemers"></table>

  <table class="info">
    <tr><th>Reserve lijst</th></tr>
  </table>

  <table class="lijst" id="reserve"></table>

</div>

<script>
const sheetUrl =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vS075yJCgYbuaeO8Mn1jB9SnHKYAyTxMR8lYRCjztsbuiuUZ2sNjrOKH2AxNNp7GkBpDgd23mxN-6kI/pub?gid=74050298&single=true&output=csv";

loadSheet();
setInterval(loadSheet, 30000);

function loadSheet() {
  fetch(sheetUrl + "&t=" + Date.now())
    .then(response => response.text())
    .then(csv => {
      document.getElementById("deelnemers").innerHTML = "";
      document.getElementById("reserve").innerHTML = "";

      const rows = parseCSV(csv);
      let mode = "deelnemers";

      rows.forEach(row => {
        const text = row.join(" ").toLowerCase();

        if (text.includes("reserve")) {
          mode = "reserve";
          return;
        }

        if (text.includes("echteld")) {
          document.getElementById("plaats").textContent = "Echteld";
        }

        const nummer = row[0];
        const naam = row[1];

        if (!nummer || isNaN(Number(nummer))) return;

        addRow(mode, nummer, naam || "");
      });
    });
}

function addRow(tableId, nummer, naam) {
  const table = document.getElementById(tableId);
  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td>${nummer}</td>
    <td>${naam}</td>
    <td><input type="checkbox"></td>
  `;

  table.appendChild(tr);
}

function parseCSV(csv) {
  const rows = [];
  let row = [];
  let value = "";
  let inQuotes = false;

  for (let i = 0; i < csv.length; i++) {
    const char = csv[i];
    const next = csv[i + 1];

    if (char === '"' && inQuotes && next === '"') {
      value += '"';
      i++;
    } else if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === "," && !inQuotes) {
      row.push(value.trim());
      value = "";
    } else if ((char === "\n" || char === "\r") && !inQuotes) {
      if (value || row.length) {
        row.push(value.trim());
        rows.push(row);
      }
      row = [];
      value = "";
      if (char === "\r" && next === "\n") i++;
    } else {
      value += char;
    }
  }

  if (value || row.length) {
    row.push(value.trim());
    rows.push(row);
  }

  return rows;
}
</script>

</body>
</html>
