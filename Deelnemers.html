<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Darts deelnemers</title>
  
<link rel="icon" type="image/png" href="logo.png">
<link rel="stylesheet" href="style.css">

</head>

<body>


  
<div class="dart-card">

  <img src="logo.png" class="logo-img" alt="Darts Echteld">
  <nav class="menu">
  <a href="index.html">Poulestand</a>
  <a class="active" href="Deelnemers.html">Deelnemers</a>
</nav>
<link rel="stylesheet" href="style.css">
  <div class="plaats" id="plaats">Echteld</div>

  <table class="info">
    <tr><th>Deelnemers</th></tr>
    <tr><td id="datum">13 juni 2026</td></tr>
  </table>

  <table class="lijst" id="deelnemers"></table>

  <table class="info">
    <tr><th>Reserve lijst</th></tr>
  </table>

  <table class="lijst" id="reserve"></table>

</div>

<script>
const sheetUrl =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vS075yJCgYbuaeO8Mn1jB9SnHKYAyTxMR8lYRCjztsbuiuUZ2sNjrOKH2AxNNp7GkBpDgd23mxN-6kI/pub?gid=74050298&single=true&output=csv";

loadSheet();
setInterval(loadSheet, 30000);

function loadSheet() {
  fetch(sheetUrl + "&t=" + Date.now())
    .then(response => response.text())
    .then(csv => {
      document.getElementById("deelnemers").innerHTML = "";
      document.getElementById("reserve").innerHTML = "";

      const rows = parseCSV(csv);
      let mode = "deelnemers";

      rows.forEach(row => {
        const text = row.join(" ").toLowerCase();

        if (text.includes("reserve")) {
          mode = "reserve";
          return;
        }

        if (text.includes("echteld")) {
          document.getElementById("plaats").textContent = "Echteld";
        }

        const nummer = row[0];
        const naam = row[1];

        if (!nummer || isNaN(Number(nummer))) return;

        addRow(mode, nummer, naam || "");
      });
    });
}

function addRow(tableId, nummer, naam) {
  const table = document.getElementById(tableId);
  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td>${nummer}</td>
    <td>${naam}</td>
    <td><input type="checkbox"></td>
  `;

  table.appendChild(tr);
}

function parseCSV(csv) {
  const rows = [];
  let row = [];
  let value = "";
  let inQuotes = false;

  for (let i = 0; i < csv.length; i++) {
    const char = csv[i];
    const next = csv[i + 1];

    if (char === '"' && inQuotes && next === '"') {
      value += '"';
      i++;
    } else if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === "," && !inQuotes) {
      row.push(value.trim());
      value = "";
    } else if ((char === "\n" || char === "\r") && !inQuotes) {
      if (value || row.length) {
        row.push(value.trim());
        rows.push(row);
      }
      row = [];
      value = "";
      if (char === "\r" && next === "\n") i++;
    } else {
      value += char;
    }
  }

  if (value || row.length) {
    row.push(value.trim());
    rows.push(row);
  }

  return rows;
}
</script>

</body>
</html>
