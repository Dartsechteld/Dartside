<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Darts Poulestand</title>

<link rel="icon"
type="image/png"
href="logo.png">

<link rel="stylesheet"
href="style.css?v=4">

</head>

<body>

<div class="page">

  <img
    src="logo.png"
    class="logo-img"
    alt="Darts Echteld"
  >

  <div id="menu"></div>

  <div id="poules">

    <div class="melding">
      Laden...
    </div>

  </div>

</div>

<script src="menu.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script src="autorefresh.js?v=1"></script>

<script>

/* SHEET URL */

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vS075yJCgYbuaeO8Mn1jB9SnHKYAyTxMR8lYRCjztsbuiuUZ2sNjrOKH2AxNNp7GkBpDgd23mxN-6kI/pub?gid=1492837350&single=true&output=csv';

/* POULES */

const poules = [

  { naam:'Poule A', start:12, eind:16 },
  { naam:'Poule B', start:20, eind:24 },
  { naam:'Poule C', start:28, eind:32 },
  { naam:'Poule D', start:36, eind:40 },
  { naam:'Poule E', start:44, eind:48 },
  { naam:'Poule F', start:52, eind:56 },
  { naam:'Poule G', start:60, eind:64 },
  { naam:'Poule H', start:68, eind:72 }

];

/* START */

window.addEventListener("load", function(){

  startAutoRefresh(
    laadPoules,
    10000
  );

});

/* CEL UITLEZEN */

function cel(data, rij, kolom){

  if(!data[rij - 1]){
    return '';
  }

  return data[rij - 1][kolom - 1] || '';

}

/* TABEL MAKEN */

function maakTabel(poule, data){

  let html = '';

  let aantalSpelers = 0;

  html += '<table class="pool">';

  html += '<tr>';

  html += `
    <th colspan="5">
      ${poule.naam}
    </th>
  `;

  html += '</tr>';

  html += '<tr>';

  html += '<th>Naam</th>';
  html += '<th>HF</th>';
  html += '<th>V</th>';
  html += '<th>T</th>';
  html += '<th>P</th>';

  html += '</tr>';

  for(
    let rij = poule.start;
    rij <= poule.eind;
    rij++
  ){

    const naam =
      cel(data, rij, 2);

    if(
      naam.trim() === ''
    ){
      continue;
    }

    aantalSpelers++;

    html += '<tr>';

    html += `
      <td>${naam}</td>
    `;

    html += `
      <td>${cel(data, rij, 3)}</td>
    `;

    html += `
      <td>${cel(data, rij, 4)}</td>
    `;

    html += `
      <td>${cel(data, rij, 5)}</td>
    `;

    html += `
      <td>${cel(data, rij, 6)}</td>
    `;

    html += '</tr>';

  }

  html += '</table>';

  if(aantalSpelers === 0){
    return '';
  }

  return html;

}

/* SHEET LADEN */

function laadPoules(){

  return new Promise(function(resolve){

    Papa.parse(
      CSV_URL + '&t=' + Date.now(),

      {

        download:true,

        complete:function(result){

          const data =
            result.data;

          let html = '';

          poules.forEach(function(poule){

            html +=
              maakTabel(
                poule,
                data
              );

          });

          document
            .getElementById(
              'poules'
            )
            .innerHTML = html;

          resolve();

        },

        error:function(error){

          document
            .getElementById(
              'poules'
            )
            .innerHTML =

            '<div class="melding">Sheet laden mislukt</div>';

          console.log(error);

          resolve();

        }

      }

    );

  });

}

</script>

</body>

</html>
