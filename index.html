<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Darts Echteld</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

:root{
  --bg:#0f5660;
  --line:#ffffff;
  --text:#ffffff;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
}

.page{
  max-width:360px;
  margin:auto;
  padding:15px;
}

.logo-img{
  display:block;
  width:120px;
  margin:0 auto 20px;
}

.pool{
  width:100%;
  border-collapse:collapse;
  margin-bottom:20px;
}

.pool th,
.pool td{
  border:1px solid var(--line);
  padding:4px;
  font-size:12px;
  text-align:center;
}

.pool td:first-child{
  text-align:left;
}

.melding{
  text-align:center;
  font-weight:bold;
}

.menu {
  width: 220px;
  background: #083f47;
  padding: 8px 12px;
  box-sizing: border-box;

  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;

  margin: 0 auto;
}
.menu a {
  color: white;
  text-decoration: none;
  font-family: Arial, sans-serif;
  font-size: 12px;
  font-weight: bold;
  border: 1px solid white;
  padding: 4px 8px;
  background: #0b7fc3;
}

.menu a:hover {
  background: #62b5ff;
  color: #083f47;
}
  

</style>
</head>

<body>

<nav class="menu">
  <a href="index.html">Deelnemers</a>
  <a href="Deelnemers.html">Reserve</a>
</nav>

  
<div class="page">

  <img src="logo.png" class="logo-img" alt="Darts Echteld">

  <div id="poules">
    <div class="melding">Laden...</div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vS075yJCgYbuaeO8Mn1jB9SnHKYAyTxMR8lYRCjztsbuiuUZ2sNjrOKH2AxNNp7GkBpDgd23mxN-6kI/pub?gid=1492837350&single=true&output=csv';

const poules = [
  { naam:'Poule A', start:12, eind:16 },
  { naam:'Poule B', start:20, eind:24 },
  { naam:'Poule C', start:28, eind:32 },
  { naam:'Poule D', start:36, eind:40 },
  { naam:'Poule E', start:44, eind:48 },
  { naam:'Poule F', start:52, eind:56 },
  { naam:'Poule G', start:60, eind:64 },
  { naam:'Poule H', start:68, eind:72 }
];

function cel(data, rij, kolom){

  if(!data[rij-1]){
    return '';
  }

  return data[rij-1][kolom-1] || '';
}

function maakTabel(poule, data){

  let html = '';

  let aantalSpelers = 0;

  html += '<table class="pool">';

  html += '<tr>';
  html += '<th colspan="5">' + poule.naam + '</th>';
  html += '</tr>';

  html += '<tr>';
  html += '<th>Naam</th>';
  html += '<th>HF</th>';
  html += '<th>V</th>';
  html += '<th>T</th>';
  html += '<th>P</th>';
  html += '</tr>';

  for(let rij = poule.start; rij <= poule.eind; rij++){

    const naam = cel(data, rij, 2);

    if(naam.trim() === ''){
      continue;
    }

    aantalSpelers++;

    html += '<tr>';

    html += '<td>' + naam + '</td>';
    html += '<td>' + cel(data, rij, 3) + '</td>';
    html += '<td>' + cel(data, rij, 4) + '</td>';
    html += '<td>' + cel(data, rij, 5) + '</td>';
    html += '<td>' + cel(data, rij, 6) + '</td>';

    html += '</tr>';
  }

  html += '</table>';

  if(aantalSpelers === 0){
    return '';
  }

  return html;
}

function laadPoules(){

  Papa.parse(CSV_URL + '&t=' + Date.now(), {

    download:true,

    complete:function(result){

      const data = result.data;

      let html = '';

      poules.forEach(function(poule){

        html += maakTabel(poule, data);

      });

      document.getElementById('poules').innerHTML = html;
    },

    error:function(error){

      document.getElementById('poules').innerHTML =
        '<div class="melding">Sheet laden mislukt</div>';

      console.log(error);
    }

  });
}

laadPoules();

setInterval(laadPoules, 30000);

</script>

</body>
</html>
