<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darts Echteld</title>

<style>
:root{
  --bg:#0f5660;
  --line:#ffffff;
  --text:#ffffff;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
}

.page{
  max-width:360px;
  margin:auto;
  padding:15px;
}

.logo{
  width:120px;
  height:120px;
  margin:0 auto 20px;
  background:#f4eadf;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.logo h1{
  margin:0;
  color:red;
  font-size:32px;
}

.logo span{
  background:#1d5f93;
  padding:4px 12px;
  border-radius:4px;
  margin-top:10px;
}

.pool{
  width:100%;
  border-collapse:collapse;
  margin-bottom:20px;
}

.pool th,
.pool td{
  border:1px solid var(--line);
  padding:4px;
  font-size:12px;
  text-align:center;
}

.pool td:first-child{
  text-align:left;
}

.melding{
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="page">

  <div class="logo">
    <div>🎯🎯🎯</div>
    <h1>Darts</h1>
    <span>Echteld</span>
  </div>

  <div id="poules">
    <div class="melding">Laden...</div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vS075yJCgYbuaeO8Mn1jB9SnHKYAyTxMR8lYRCjztsbuiuUZ2sNjrOKH2AxNNp7GkBpDgd23mxN-6kI/pub?gid=1492837350&single=true&output=csv';

const poules = [
  { naam:'Poule A', start:12, eind:16 },
  { naam:'Poule B', start:20, eind:24 },
  { naam:'Poule C', start:28, eind:32 },
  { naam:'Poule D', start:36, eind:40 },
  { naam:'Poule E', start:44, eind:48 },
  { naam:'Poule F', start:52, eind:56 },
  { naam:'Poule G', start:60, eind:64 },
  { naam:'Poule H', start:68, eind:72 }
];

function cel(data, rij, kolom){

  if(!data[rij-1]) return '';

  return data[rij-1][kolom-1] || '';
}

function maakTabel(poule, data){

  let html = '';

  html += '<table class="pool">';

  html += '<tr>';
  html += '<th colspan="5">' + poule.naam + '</th>';
  html += '</tr>';

  html += '<tr>';
  html += '<th>Naam</th>';
  html += '<th>HF</th>';
  html += '<th>V</th>';
  html += '<th>T</th>';
  html += '<th>P</th>';
  html += '</tr>';

  for(let rij = poule.start; rij <= poule.eind; rij++){

    html += '<tr>';

    html += '<td>' + cel(data, rij, 2) + '</td>';
    html += '<td>' + cel(data, rij, 3) + '</td>';
    html += '<td>' + cel(data, rij, 4) + '</td>';
    html += '<td>' + cel(data, rij, 5) + '</td>';
    html += '<td>' + cel(data, rij, 6) + '</td>';

    html += '</tr>';
  }

  html += '</table>';

  return html;
}

Papa.parse(CSV_URL, {

  download:true,

  complete:function(result){

    const data = result.data;

    let html = '';

    poules.forEach(function(poule){

      html += maakTabel(poule, data);

    });

    document.getElementById('poules').innerHTML = html;
  },

  error:function(error){

    document.getElementById('poules').innerHTML =
      '<div class="melding">Sheet laden mislukt</div>';

    console.log(error);
  }

});

</script>
