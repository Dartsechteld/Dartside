<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Darts Invoer</title>

<link rel="icon"
type="image/png"
href="logo.png">

<link rel="stylesheet"
href="style.css?v=8">

</head>

<body>

<div class="page">

  <img
    src="logo.png"
    class="logo-img"
    alt="Darts Echteld"
  >

  <a href="index.html" class="terug-knop">
    ← Terug
  </a>

  <div class="invoer-box">

    <h2>
      Uitslag invoeren
    </h2>

    <label for="pin">
      Pincode
    </label>

    <input
      type="password"
      id="pin"
      placeholder="Pincode"
    >

    <label for="wedstrijdnummer">
      Wedstrijdnummer
    </label>

    <input
      type="number"
      id="wedstrijdnummer"
      placeholder="Wedstrijdnummer"
      oninput="zoekWedstrijd()"
    >

    <div class="speler-invoer">

      <div class="speler-regel">

        <div class="speler-naam">
          <span>Speler 1</span>
          <strong id="speler1Naam">-</strong>
        </div>

        <input
          type="number"
          id="score1"
          min="0"
          placeholder="Score"
        >

        <input
          type="number"
          id="hf1"
          min="0"
          placeholder="HF"
        >

        <input
          type="number"
          id="max180_1"
          min="0"
          placeholder="180"
        >

      </div>

      <div class="speler-regel">

        <div class="speler-naam">
          <span>Speler 2</span>
          <strong id="speler2Naam">-</strong>
        </div>

        <input
          type="number"
          id="score2"
          min="0"
          placeholder="Score"
        >

        <input
          type="number"
          id="hf2"
          min="0"
          placeholder="HF"
        >

        <input
          type="number"
          id="max180_2"
          min="0"
          placeholder="180"
        >

      </div>

    </div>

    <button
      id="opslaanKnop"
      onclick="opslaanUitslag()"
      disabled
    >
      Opslaan
    </button>

    <div
      id="status"
      class="status"
    >
      Wedstrijdnummer invullen
    </div>

  </div>

</div>

<script src=
"https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js">
</script>

<script>

const sheetUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vS075yJCgYbuaeO8Mn1jB9SnHKYAyTxMR8lYRCjztsbuiuUZ2sNjrOKH2AxNNp7GkBpDgd23mxN-6kI/pub?gid=878988781&single=true&output=csv";

const scriptUrl =
"https://script.google.com/macros/s/AKfycbzNakwhd97tdksDD3ZN7jE-Qke_eeXmH-6GZwAyingUrmgwg4VN506UMgf8EmEuqmFq2w/exec";

let sheetData = [];
let gekozenWedstrijd = null;

window.addEventListener("load", function(){

  laadWedstrijden();

});

function laadWedstrijden(){

  Papa.parse(sheetUrl + "&t=" + Date.now(), {

    download:true,

    complete:function(result){

      sheetData = result.data;

      document.getElementById("status").innerText =
        "Wedstrijdnummer invullen";

    },

    error:function(error){

      console.log(error);

      document.getElementById("status").innerText =
        "Wedstrijden laden mislukt";

    }

  });

}

function zoekWedstrijd(){

  const wedstrijdnummer =
    document.getElementById("wedstrijdnummer").value.trim();

  const speler1Naam =
    document.getElementById("speler1Naam");

  const speler2Naam =
    document.getElementById("speler2Naam");

  const status =
    document.getElementById("status");

  const opslaanKnop =
    document.getElementById("opslaanKnop");

  speler1Naam.innerText = "-";
  speler2Naam.innerText = "-";

  status.innerText = "";
  opslaanKnop.disabled = true;
  gekozenWedstrijd = null;

  if(wedstrijdnummer === ""){

    status.innerText =
      "Wedstrijdnummer invullen";

    return;

  }

  const gevondenRij =
    sheetData.find(function(row){

      return String(row[1]).trim() === wedstrijdnummer;

    });

  if(!gevondenRij){

    status.innerText =
      "Wedstrijd niet gevonden";

    return;

  }

  gekozenWedstrijd = {
    nummer: gevondenRij[1],
    speler1: gevondenRij[3],
    speler2: gevondenRij[4]
  };

  speler1Naam.innerText =
    gekozenWedstrijd.speler1 || "-";

  speler2Naam.innerText =
    gekozenWedstrijd.speler2 || "-";

  status.innerText =
    "Wedstrijd gevonden";

  opslaanKnop.disabled = false;

}

function opslaanUitslag(){

  if(!gekozenWedstrijd){
    return;
  }

  const pin =
    document.getElementById("pin").value.trim();

  const score1 =
    document.getElementById("score1").value.trim();

  const score2 =
    document.getElementById("score2").value.trim();

  const hf1 =
    document.getElementById("hf1").value.trim();

  const hf2 =
    document.getElementById("hf2").value.trim();

  const max180_1 =
    document.getElementById("max180_1").value.trim();

  const max180_2 =
    document.getElementById("max180_2").value.trim();

  const status =
    document.getElementById("status");

  if(pin === ""){

    status.innerText =
      "Vul pincode in";

    return;

  }

  if(score1 === "" || score2 === ""){

    status.innerText =
      "Vul beide scores in";

    return;

  }

  status.innerText =
    "Opslaan...";

  fetch(scriptUrl, {

    method:"POST",

    body:JSON.stringify({
      pin: pin,

      wedstrijdnummer: gekozenWedstrijd.nummer,

      speler1: gekozenWedstrijd.speler1,
      speler2: gekozenWedstrijd.speler2,

      score1: score1,
      score2: score2,

      hf1: hf1,
      hf2: hf2,

      max180_1: max180_1,
      max180_2: max180_2
    })

  })
  .then(function(response){
    return response.text();
  })
  .then(function(text){

    if(text !== "OK"){

      status.innerText = text;
      return;

    }

    status.innerText =
      "Uitslag opgeslagen";

    document.getElementById("wedstrijdnummer").value = "";

    document.getElementById("speler1Naam").innerText = "-";
    document.getElementById("speler2Naam").innerText = "-";

    document.getElementById("score1").value = "";
    document.getElementById("score2").value = "";

    document.getElementById("hf1").value = "";
    document.getElementById("hf2").value = "";

    document.getElementById("max180_1").value = "";
    document.getElementById("max180_2").value = "";

    gekozenWedstrijd = null;

    document.getElementById("opslaanKnop").disabled = true;

  })
  .catch(function(error){

    console.log(error);

    status.innerText =
      "Opslaan mislukt";

  });

}

</script>

</body>

</html>
